<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1e272e; 
            --accent: #ff9f43; 
            --success: #0be881; 
            --danger: #ff5e57; 
            --bg: #f1f2f6; 
            --white: #ffffff;
            --toters: #00d2d3;
            --talabat: #ff5e57;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { font-family: 'Changa', sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--primary); }
        .main-container { flex: 3; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .header-bar { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 25px; border-radius: 15px; box-shadow: var(--card-shadow); }
        .btn-action { padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; font-family: 'Changa'; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: var(--transition); }
        .mic-on { background-color: var(--success); color: white; box-shadow: 0 4px 12px rgba(11, 232, 129, 0.3); }
        .mic-off { background-color: var(--danger); color: white; }
        .menu-category { margin-bottom: 25px; }
        .category-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 15px; color: var(--primary); padding-right: 15px; border-right: 5px solid var(--accent); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .card { background: var(--white); border-radius: 18px; padding: 15px; text-align: center; box-shadow: var(--card-shadow); border: 2px solid transparent; transition: var(--transition); position: relative; cursor: pointer; height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card.active { border-color: var(--success); background: linear-gradient(145deg, #ffffff, #e6fffa); transform: scale(1.02); }
        .card i { font-size: 2rem; color: var(--accent); margin-bottom: 10px; transition: var(--transition); }
        .card.active i { color: var(--success); transform: scale(1.1); }
        .card h3 { font-size: 0.95rem; margin: 5px 0; font-weight: 700; color: var(--primary); }
        .card p { font-size: 0.85rem; color: var(--success); font-weight: 600; margin: 0; }
        .card .badge { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; animation: popIn 0.3s ease; }
        
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        
        @keyframes pulse-note {
            0% { border-color: #feb2b2; box-shadow: 0 0 0 0px rgba(245, 101, 101, 0.2); }
            50% { border-color: #f56565; box-shadow: 0 0 0 4px rgba(245, 101, 101, 0.1); }
            100% { border-color: #feb2b2; box-shadow: 0 0 0 0px rgba(245, 101, 101, 0); }
        }

        .sidebar { flex: 1; background: var(--white); display: flex; flex-direction: column; border-right: 1px solid #ddd; min-width: 340px; }
        .cart-header { padding: 20px; background: var(--primary); color: white; text-align: center; border-bottom: 4px solid var(--accent); }
        .cart-content { flex: 1; padding: 15px; overflow-y: auto; }
        .item-row { display: flex; flex-direction: column; padding: 12px; background: #f8f9fa; border-radius: 10px; margin-bottom: 8px; animation: slideIn 0.3s ease; border-right: 4px solid var(--accent); }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .order-options { padding: 10px 15px; background: #f8f9fa; border-bottom: 1px solid #eee; }
        .type-selector { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .type-btn { flex: 1; padding: 8px 5px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-family: 'Changa'; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        .type-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .type-btn.toters.active { background: var(--toters); border-color: var(--toters); }
        .type-btn.talabat.active { background: var(--talabat); border-color: var(--talabat); }
        
        .notes-input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Changa'; box-sizing: border-box; }

        .total-section { padding: 20px; background: #fff; border-top: 2px dashed #ccc; }
        .total-box { display: flex; justify-content: space-between; font-size: 1.6rem; font-weight: 900; margin-bottom: 5px; color: var(--primary); }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-family: 'Changa'; font-weight: 700; cursor: pointer; margin-top: 8px; font-size: 1.1rem; transition: var(--transition); }
        .btn-print { background: var(--success); color: white; box-shadow: 0 6px 20px rgba(11, 232, 129, 0.4); }
        .voice-bar { position: fixed; bottom: 25px; left: 25px; background: rgba(30, 39, 46, 0.95); backdrop-filter: blur(10px); color: white; padding: 12px 30px; border-radius: 50px; display: flex; align-items: center; gap: 15px; font-size: 0.9rem; z-index: 1000; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        .dot { width: 12px; height: 12px; background: #555; border-radius: 50%; transition: 0.3s; }
        .mic-on-active .dot { background: var(--success); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(11, 232, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(11, 232, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(11, 232, 129, 0); } }

        #printable-receipt { 
            display: none; 
            width: 80mm; 
            padding: 5mm; 
            color: #000; 
            background: #fff; 
            box-sizing: border-box; 
            direction: rtl; 
            font-family: 'Changa', sans-serif;
        }
        .receipt-header h2 { margin: 5px 0; font-size: 20px; text-align: center; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .receipt-info { display: flex; justify-content: space-between; font-size: 11px; margin: 10px 0; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .receipt-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .receipt-table th, .receipt-table td { border: 1px solid #000; padding: 6px 2px; font-size: 11px; text-align: center; font-weight: bold; word-wrap: break-word; }
        .col-id { width: 10%; }
        /* تم التعديل هنا لجعل النص في الوسط */
        .col-name { width: 35%; text-align: center !important; padding-right: 0 !important; }
        .col-qty { width: 15%; }
        .col-price { width: 20%; }
        .col-total { width: 20%; }
        .total-final { font-size: 17px; font-weight: 900; padding: 10px; border: 2px solid #000; text-align: center; margin-top: 10px; }
        .receipt-notes { margin-top: 10px; font-size: 12px; border: 1px solid #000; padding: 5px; }
        .footer-msg { font-size: 11px; text-align: center; margin-top: 10px; border-top: 1px dashed #000; padding-top: 5px; font-weight: bold; }
        
        .item-kitchen-note { 
            display: block; 
            color: #000; 
            font-weight: 900; 
            font-size: 10px; 
            margin-top: 3px; 
            padding: 2px;
            border: 1.5px dotted #000; 
        }

        @media print {
            body > *:not(#printable-receipt) { display: none !important; }
            #printable-receipt { display: block !important; width: 100% !important; position: absolute; top: 0; right: 0; }
            @page { size: 80mm auto; margin: 0; }
        }

    </style>
</head>

        <div class="cart-content" id="cart-list-ui">

    </div>

    <div id="printable-receipt">

        <div class="footer-msg">شكراً لزيارتكم - نتمى لكم يوماً سعيداً</div>
    </div>

    async function fetchOrderIdFromDB() {
        try {
            const response = await fetch('get_last_order.php');

            orderId = parseInt(data.last_id) + 1;
            updateOrderUI();
        } catch (e) {
            orderId = 101; 
            updateOrderUI();
        }
    }

    function updateOrderUI() {
        const display = document.getElementById('order-number-display');
        if (display) display.innerText = "طلب رقم: #" + orderId;
    }

    function setOrderType(type) {
        orderType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        if(type === 'صاله') document.getElementById('btn-dinein').classList.add('active');
        if(type === 'سفري') document.getElementById('btn-takeaway').classList.add('active');
        if(type === 'توترز') document.getElementById('btn-toters').classList.add('active');
        if(type === 'طلبات') document.getElementById('btn-talabat').classList.add('active');
        renderCart(); 
    }

    function normalizeArabicNumerals(str) {
        const arabicNumbers = [/٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g];
        for(let i=0; i<10; i++) str = str.replace(arabicNumbers[i], i);
        return str;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ar-IQ'; 
    recognition.continuous = true; 
    recognition.interimResults = true;

    recognition.onresult = (e) => {
        if (!isMicActive) return;
        document.getElementById('v-bar').classList.add('mic-on-active');
        
        for (let i = e.resultIndex; i < e.results.length; ++i) {
            let rawTranscript = e.results[i][0].transcript.toLowerCase().trim();
            let originalTranscript = normalizeArabicNumerals(rawTranscript);
            let transcript = originalTranscript;

            let wordsArray = transcript.split(/\s+/);
            
if (transcript.includes("ملاحظه") || transcript.includes("ملاحظة") || transcript.includes("سجل")) {
    let triggerWord = transcript.includes("ملاحظة") ? "ملاحظة" : (transcript.includes("ملاحظه") ? "ملاحظه" : "سجل");
    let parts = transcript.split(triggerWord);
    
    if (parts.length > 1) {
        let limit = (triggerWord === "سجل") ? 15 : 7;
        let noteContent = parts[1].trim().split(/\s+/).slice(0, limit).join(" ");
        
        if (triggerWord === "سجل") {
            document.getElementById('order-notes').value = noteContent;
        } else if (basket.length > 0) {
            basket[basket.length - 1].note = noteContent;
            renderCart();
        }
    }
}
            if (wordsArray.length >= 2 && !e.results[i].isFinal) {
                let firstTwo = wordsArray.slice(0, 2).join(" ");
                const numberWords = ["واحد", "وحده", "اثنين", "ثنين", "ثلاثه", "تلاثه", "ثلاث", "تلاث", "اربعه", "اربع", "خمسه", "خمس", "سته", "سبعه","ثمانيه","تسعه","عشره"];
                
                const systemCommands = ["الزبون","ساعه","توصيل","رقم","طاوله","سجل", "ملاحظه", "ملاحظة", "مساح", "امسح", "تم", "دم", "كم", "سفري", "صاله", "محلي","مستعجل", "توترز", "طلبات", "احذف", "شيل", "الغي", "بطلت", "بدون", "زيادة"];
                
                const hasMenuWordInStart = menuData.some(item => item.keys.some(key => firstTwo.includes(key)));
                const hasSystemCmdInStart = systemCommands.some(cmd => transcript.includes(cmd)); 
                const startsWithNumber = numberWords.some(num => firstTwo.includes(num)) || /^\d+/.test(firstTwo);

                const isNoteMode = transcript.includes("سجل") || transcript.includes("ملاحظة") || transcript.includes("ملاحظه");

                if (!hasMenuWordInStart && !hasSystemCmdInStart && !startsWithNumber && !isNoteMode) {
                    tempDisableMic(2);
                    return;
                }
            }
            
            for (const [wrong, right] of Object.entries(voiceCorrections)) {
                if (transcript.includes(wrong)) transcript = transcript.split(wrong).join(right);
            }

            document.getElementById('live-text').innerText = transcript;

            if (transcript.includes("سفري")) { setOrderType('سفري'); transcript = transcript.replace("سفري", ""); }
            if (transcript.includes("صاله") || transcript.includes("محلي")) { setOrderType('صاله'); transcript = transcript.replace(/صاله|محلي/g, ""); }
            if (transcript.includes("توترز") || transcript.includes("توتيرز")) { setOrderType('توترز'); transcript = transcript.replace(/توترز|توتيرز/g, ""); }
            if (transcript.includes("طلبات")) { setOrderType('طلبات'); transcript = transcript.replace("طلبات", ""); }

            processOrder(transcript, originalTranscript);

            if (e.results[i].isFinal) {
                processedTokens.clear();
            }
        }
    };

    function tempDisableMic(seconds) {
        if (!isMicActive) return;
        isMicActive = false;
        recognition.stop();
        
        const btn = document.getElementById('mic-toggle');
        const originalHTML = btn.innerHTML;
        const originalClass = btn.className;
        
        btn.className = "btn-action mic-off";
        btn.innerHTML = `<i class="fas fa-microphone-slash"></i> <span>خارج المنيو (انتظر ${seconds}ث)</span>`;
        document.getElementById('v-bar').style.display = "none";

        setTimeout(() => {
            isMicActive = true;
            try { recognition.start(); } catch(e) {}
            btn.className = originalClass;
            btn.innerHTML = originalHTML;
            document.getElementById('v-bar').style.display = "flex";
            document.getElementById('live-text').innerText = "تمت إعادة تشغيل المايك...";
        }, seconds * 1000);
    }

    recognition.onend = () => { if (isMicActive) try { recognition.start(); } catch(e) {} };

    function processOrder(text, originalText) {
        if (!text) return;
        if (text.includes("مسح") || text.includes("امسح") || text.includes("تمساح")) { clearCart(); return; }

        const words = text.split(/\s+/);
        if (words.some(w => ["دم", "تم", "كم"].includes(w))) {
            if (basket.length > 0 && !processedTokens.has("DONE")) {
                printReceipt(); 
                processedTokens.add("DONE");
            }
            return;
        }

        const isDeleteIntent = ["احذف", "شيل", "الغي", "بطلت"].some(cmd => text.includes(cmd));
        let textToMatch = text;
        const sortedMenu = [...menuData].sort((a, b) => Math.max(...b.keys.map(k => k.length)) - Math.max(...a.keys.map(k => k.length)));

        sortedMenu.forEach(item => {
            const foundKey = item.keys.find(key => textToMatch.includes(key));
            if (foundKey) {
                const actionType = isDeleteIntent ? "DEL" : "ADD";
                const tokenKey = item.id + "_" + actionType;

                if (!processedTokens.has(tokenKey)) {
                    if (isDeleteIntent) {
                        const idx = basket.findIndex(b => b.id === item.id);
                        if (idx > -1) { basket.splice(idx, 1); renderCart(); }
                    } else {
                        let qty = findNumberUniversal(text, originalText, foundKey, true);
                        if (qty !== null) {
                            const idx = basket.findIndex(b => b.id === item.id && !b.note);
                            if (idx > -1) basket[idx].qty += qty;
                            else basket.push({ ...item, qty: qty, note: "" }); 
                            renderCart();
                        }
                    }
                    processedTokens.add(tokenKey);
                }
                textToMatch = textToMatch.replace(foundKey, '');
            }
        });
    }

    function findNumberUniversal(text, originalText, foundKey, strict = false) {
        const words = (text + " " + originalText).trim().split(/\s+/);
        for (let w of words) {
            if (w.match(/^\d+$/) && parseInt(w) < 50) return parseInt(w);
            if (wordToNum[w]) return wordToNum[w];
        }
        return strict ? null : 1;
    }

    function renderMenu() {
        const container = document.getElementById('full-menu-container');
        if(!container) return;
        const categories = [...new Set(menuData.map(item => item.category))];
        let html = "";
        categories.forEach(cat => {
            html += `<div class="menu-category"><div class="category-title">${cat}</div><div class="menu-grid">`;
            menuData.filter(i => i.category === cat).forEach(item => {
                html += `<div class="card" data-id="${item.id}" onclick="addToBasket(${item.id})">
                    <div class="badge" style="display:none"></div>
                    <i class="fas ${item.icon}"></i><h3>${item.name}</h3><p>${item.price.toLocaleString()} د.ع</p>
                </div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    function addToBasket(id) {
        const item = menuData.find(m => m.id === id);
        const exists = basket.find(b => b.id === id && !b.note);
        if (exists) exists.qty++; else basket.push({ ...item, qty: 1, note: "" });
        renderCart();
    }

    function renderCart() {
        const listUI = document.getElementById('cart-list-ui');
        let total = 0;
        if (basket.length === 0) {
            listUI.innerHTML = `<div style="text-align:center; color:#999; margin-top:50px;"><i class="fas fa-brain" style="font-size:3rem; margin-bottom:15px; opacity:0.1;"></i><p>القائمة فارغة</p></div>`;
            document.getElementById('total-price-ui').innerText = "0";
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('active'); c.querySelector('.badge').style.display = 'none'; });
            return;
        }
        listUI.innerHTML = basket.map(item => {
            total += (item.price * item.qty);
            return `<div class="item-row">
                        <div style="display:flex; justify-content:space-between; width:100%; align-items: center;">
                            <div><b style="font-size: 1.1rem;">${item.name}</b><span style="background: var(--primary); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; margin-right: 5px;">x${item.qty}</span></div>
                            <div style="color:var(--success); font-weight:bold; font-size: 1.1rem;">${(item.price * item.qty).toLocaleString()}</div>
                        </div>
                        ${item.note ? `<div style="margin-top: 10px; background: #fff5f5; border: 1px solid #feb2b2; border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; animation: pulse-note 2s infinite;"><i class="fas fa-exclamation-triangle" style="color: #e53e3e; font-size: 0.8rem;"></i><span style="color: #c53030; font-size: 0.85rem; font-weight: 700;">${item.note}</span></div>` : ''}
                    </div>`;
        }).join('');

        document.getElementById('total-price-ui').innerText = total.toLocaleString() + " د.ع";
        document.querySelectorAll('.card').forEach(card => {
            const items = basket.filter(b => b.id == card.dataset.id);
            const badge = card.querySelector('.badge');
            if (items.length > 0) { card.classList.add('active'); badge.innerText = items.reduce((s, i) => s + i.qty, 0); badge.style.display = "flex"; }
            else { card.classList.remove('active'); badge.style.display = "none"; }
        });
    }

    async function saveOrderToDB() {
        const orderData = {
            order_id: orderId,
            order_type: orderType,
            total_price: basket.reduce((sum, i) => sum + (i.price * i.qty), 0),
            notes: document.getElementById('order-notes').value,
            items: basket
        };
        try {
            await fetch('save_order.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            return true;
        } catch (e) { return false; }
    }

    async function printReceipt() {
        if (basket.length === 0) return;
        const saved = await saveOrderToDB(); 
        if(!saved) { alert("فشل الاتصال بقاعدة البيانات"); return; }

        const now = new Date();
        document.getElementById('p-date').innerText = now.toLocaleDateString('ar-IQ');
        document.getElementById('p-time').innerText = now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('p-order-id').innerText = "#" + orderId;
        document.getElementById('p-order-type').innerText = orderType;
        
        const gNotes = document.getElementById('order-notes').value;
        document.getElementById('p-notes-area').style.display = gNotes ? 'block' : 'none';
        document.getElementById('p-notes').innerText = gNotes;

        let total = 0;
        document.getElementById('p-items').innerHTML = basket.map((item, index) => {
            total += (item.price * item.qty);
            return `<tr><td>${index+1}</td><td class="col-name">${item.name}${item.note?`<span class="item-kitchen-note">${item.note}</span>`:''}</td><td>${item.qty}</td><td>${item.price}</td><td>${item.price * item.qty}</td></tr>`;
        }).join('');
        
        document.getElementById('p-total').innerText = total.toLocaleString();
        window.print();
        location.reload();
    }

    function clearCart() { basket = []; renderCart(); document.getElementById('order-notes').value = ""; }

    function toggleMic() {
        isMicActive = !isMicActive;
        const btn = document.getElementById('mic-toggle');
        const icon = document.getElementById('mic-icon');
        const text = document.getElementById('mic-status-text');
        
        if (isMicActive) {
            btn.className = "btn-action mic-on";
            icon.className = "fas fa-microphone";
            text.innerText = "المايك: مفعل";
            try { recognition.start(); } catch(e) {}
        } else {
            btn.className = "btn-action mic-off";
            icon.className = "fas fa-microphone-slash";
            text.innerText = "المايك: مغلق";
            recognition.stop();
        }
    }

    window.onload = () => {
        fetchOrderIdFromDB();
        renderMenu();
        try { recognition.start(); } catch(e) {}
    };
</script>
